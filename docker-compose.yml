services:
  backend:
    build:
      context: ./backend
    container_name: mantion-backend
    environment:
      PORT: 5000
      JWT_SECRET: mantion-dev-secret
      GOOGLE_CLIENT_ID: ""
      ADMIN_PASSCODE: admin1234
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app           # เชื่อมโฟลเดอร์ backend (แก้ไขโค้ดฝั่ง Server ได้ทันที)
      - /app/node_modules        # ป้องกันไม่ให้ไฟล์ในเครื่องไปทับ node_modules ใน container
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: mantion-frontend
    ports:
      - "8081:80"
    volumes:
      - ./frontend:/usr/share/nginx/html # เชื่อมโฟลเดอร์ frontend กับที่เก็บไฟล์ของ Nginx
    depends_on:
      - backend
    restart: unless-stopped